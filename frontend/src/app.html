<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Le Jibé — Fauteuil roulant électrique haute performance. Siège carbone sur mesure, roue stabilisatrice, contrôle par joystick. Conçu par un utilisateur, en Dordogne." />

		<!-- Preconnect to Google Fonts for performance -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

		<!--
			Font stack:
			- Outfit: display/headings (replaces Syne — same geometric feel, better readability)
			- Instrument Sans: body copy
			- Instrument Serif: italic accent (pull quotes, hero em)
		-->
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
