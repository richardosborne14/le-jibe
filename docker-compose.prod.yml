# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or just use docker compose up -d on the server (it reads both files if named correctly)

services:
  backend:
    # No bind mount in production — code is baked into the image
    volumes: []
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    restart: always

  frontend:
    # In production, SvelteKit runs as a built Node server on port 3000
    volumes: []
    command: ["node", "build"]
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: always

  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    restart: always

  postgres:
    restart: always
